<div class="card border-secondary">
    <div class="card-body py-2">
        <div class="row">
            <div class="col-md-3 text-center px-0">
                <button class="btn btn-sm btn-secondary d-inline-flex align-items-center gap-1" type="button" onclick="blur_slider.val(0);blur_images();">
                    <i class="fas fa-eye-slash mr-1"></i>
                    <span class="label-icon">Hide</span>
                </button>
            </div>
            <div class="col-md-6 text-center pl-0 pt-1">
                <input type="range" min="0" max="15" step="0.1" value="10" id="blur-slider" oninput="blur_images();">
                <div class="text-center text-danger" id="unblur_unsafe_warning" style="display: none"><i class="fa-solid fa-warning fa-2x"></i><b> Unsafe Content</b></div>
            </div>
            <div class="col-md-3 text-center">
                <button class="btn btn-sm btn-secondary d-inline-flex align-items-center gap-1" type="button" id="btn_unblur_img" onclick="blur_slider.val(15);blur_images();">
                    <i class="fas fa-image mr-1"></i>
                    <span class="label-icon">Reveal</span>
                </button>
            </div>
        </div>
    </div>
</div>


<script>
    const blur_slider = $('#blur-slider');
    function blur_images(){
        let blurValue = blur_slider.val();
        blurValue = 15 - blurValue;
        document.documentElement.style.setProperty('--object-image-blur', blurValue + 'px');
    }
    function blur_unsafe(){
        blur_slider.val(0);
        blur_images();
        let btn = $('#btn_unblur_img');
        btn.removeClass("btn-secondary")
        btn.addClass("btn-danger");
        $('#unblur_unsafe_warning').show();
    }
</script>
