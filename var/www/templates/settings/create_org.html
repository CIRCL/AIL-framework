<!DOCTYPE html>
<html>

<head>
  <title>Create Org - AIL</title>
	<link rel="icon" href="{{ url_for('static', filename='image/ail-icon.png') }}">

  <!-- Core CSS -->
	<link href="{{ url_for('static', filename='css/bootstrap4.min.css') }}" rel="stylesheet">
	<link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet">
	<link href="{{ url_for('static', filename='css/dataTables.bootstrap.min.css') }}" rel="stylesheet">

  <!-- JS -->
	<script src="{{ url_for('static', filename='js/jquery.js')}}"></script>
	<script src="{{ url_for('static', filename='js/popper.min.js')}}"></script>
	<script src="{{ url_for('static', filename='js/bootstrap4.min.js')}}"></script>

  <style>
    body {
      background: linear-gradient(180deg, #f4f8ff 0%, #f8fbff 45%, #ffffff 100%);
    }

    .org-form-card {
      border-radius: 0.85rem;
      overflow: hidden;
    }

    .org-form-card .card-header {
      background: linear-gradient(120deg, #2f6fed 0%, #5b8dff 100%) !important;
      color: #fff;
      border-bottom: 0;
    }

    .org-form-card .card-header .text-muted,
    .org-form-card .card-header .text-secondary {
      color: rgba(255, 255, 255, 0.92) !important;
    }

    .org-form-card .card-body h2 {
      color: #2f6fed;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .org-form-card .form-control:focus {
      border-color: #5b8dff;
      box-shadow: 0 0 0 0.2rem rgba(47, 111, 237, 0.18);
    }

    .org-form-card .card-footer {
      background: #f8fbff;
      border-top-color: #e5edff;
    }

    .org-primary-btn {
      background: linear-gradient(120deg, #2f6fed 0%, #4f7eff 100%);
      border: none;
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.24);
    }

    .org-primary-btn:hover,
    .org-primary-btn:focus {
      background: linear-gradient(120deg, #275fd1 0%, #446fe2 100%);
    }
  </style>
	<script src="{{ url_for('static', filename='js/jquery.dataTables.min.js')}}"></script>
	<script src="{{ url_for('static', filename='js/dataTables.bootstrap.min.js')}}"></script>

</head>
<body>

{% include 'nav_bar.html' %}
	<div class="container-fluid">
        <div class="row">
            {% include 'settings/menu_sidebar.html' %}
            <div class="col-12 col-lg-10" id="core_content">

                <div class="row justify-content-center mt-2 mb-4">
                    <div class="col-12 col-xl-10">
                        <form class="form-signin" action="{{ url_for('settings_b.create_org_post')}}" autocomplete="off" method="post">
                            <div class="card shadow-sm border-0 org-form-card">
                                <div class="card-header bg-light">
                                    <h1 class="h4 mb-1 text-secondary"><i class="fa fa-building-o mr-2"></i>Create Organisation</h1>
                                    <small class="text-muted">Add the core details and metadata for this organisation.</small>
                                </div>
                                <div class="card-body">
                                    <h2 class="h6 text-uppercase text-muted mb-3">Basic Information</h2>
                                    <div class="form-row">
                                        <div class="form-group col-md-6">
                                            <label for="inputUUID">UUID</label>
                                            <input class="form-control" type="text" id="inputUUID" name="uuid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" required>
                                            <small class="form-text text-muted">Use a UUIDv4. This cannot be changed later.</small>
                                        </div>
                                        <div class="form-group col-md-6">
                                            <label for="inputName">Name</label>
                                            <input class="form-control" type="text" id="inputName" name="name" placeholder="Organisation name" autocomplete="off" required>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="inputDescription">Description</label>
                                        <input class="form-control" type="text" id="inputDescription" name="description" placeholder="Short description (optional)" autocomplete="off">
                                    </div>

                                    <hr>
                                    <h2 class="h6 text-uppercase text-muted mb-3">Organisation Metadata</h2>
                                    <div class="form-row">
                                        <div class="form-group col-md-4">
                                            <label for="inputNationality">Nationality</label>
                                            <input class="form-control" type="text" id="inputNationality" name="nationality"
                                                   placeholder="Select or type a country"
                                                   list="nationalityOptions"
                                                   autocomplete="off">
                                            <datalist id="nationalityOptions">
                                                {% for nationality in nationality_selector %}
                                                    <option value="{{ nationality['value'] }}">{{ nationality['label'] }}</option>
                                                {% endfor %}
                                            </datalist>
                                        </div>
                                        <div class="form-group col-md-4">
                                            <label for="inputType">Org Type</label>
                                            <input class="form-control" type="text" id="inputType" name="org_type" placeholder="Private, NGO, Government... (optional)" autocomplete="off">
                                        </div>
                                        <div class="form-group col-md-4">
                                            <label for="inputSector">Sector</label>
                                            <input class="form-control" type="text" id="inputSector" name="sector" placeholder="Finance, Health, Tech... (optional)" autocomplete="off">
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer bg-white">
                                    <button class="btn btn-primary btn-lg px-4 org-primary-btn" type="submit">
                                        <i class="fa fa-plus mr-1"></i>Create Organisation
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

    	    </div>
		</div>
	</div>
</body>

<script>
$(document).ready(function(){
    $("#nav_create_org").addClass("active");
	$("#nav_orgs_management").removeClass("text-muted");

} );

function toggle_sidebar(){
	if($('#nav_menu').is(':visible')){
		$('#nav_menu').hide();
		$('#side_menu').removeClass('border-right')
		$('#side_menu').removeClass('col-lg-2')
		$('#core_content').removeClass('col-lg-10')
	}else{
		$('#nav_menu').show();
		$('#side_menu').addClass('border-right')
		$('#side_menu').addClass('col-lg-2')
		$('#core_content').addClass('col-lg-10')
	}
}

</script>

</html>
