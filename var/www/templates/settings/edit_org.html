<!DOCTYPE html>
<html>

<head>
  <title>Edit Org - AIL</title>
	<link rel="icon" href="{{ url_for('static', filename='image/ail-icon.png') }}">

  <!-- Core CSS -->
	<link href="{{ url_for('static', filename='css/bootstrap4.min.css') }}" rel="stylesheet">
	<link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel="stylesheet">

  <!-- JS -->
	<script src="{{ url_for('static', filename='js/jquery.js')}}"></script>
	<script src="{{ url_for('static', filename='js/popper.min.js')}}"></script>
	<script src="{{ url_for('static', filename='js/bootstrap4.min.js')}}"></script>

</head>
<body>

{% include 'nav_bar.html' %}
	<div class="container-fluid">
        <div class="row">
            {% include 'settings/menu_sidebar.html' %}
            <div class="col-12 col-lg-10" id="core_content">

                <form class="form-signin" action="{{ url_for('settings_b.organisation_edit', uuid=meta['uuid']) }}" autocomplete="off" method="post">
                    <h1 class="h3 mt-1 mb-3 text-center text-secondary">Edit Organisation</h1>

                    <div class="form-group">
                        <label for="inputUUID">UUID:</label>
                        <input class="form-control" type="text" id="inputUUID" value="{{ meta['uuid'] }}" readonly>
                        <small class="form-text text-muted">UUID is immutable and cannot be edited.</small>
                    </div>

                    <div class="form-group">
                        <label for="inputName">Name:</label>
                        <input class="form-control" type="text" id="inputName" name="name" placeholder="Name" value="{{ meta['name'] }}" autocomplete="off" required>
                    </div>

                    <div class="form-group">
                        <label for="inputDescription">Description:</label>
                        <input class="form-control" type="text" id="inputDescription" name="description" placeholder="Description - (optional)" value="{{ meta['description'] if meta['description'] else '' }}" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="inputNationality">Nationality:</label>
                        <select class="form-control" id="inputNationality" name="nationality">
                            <option value="">-- Select a country or region --</option>
                            {% for nationality in nationality_selector %}
                                <option value="{{ nationality['value'] }}"
                                    {% if meta['nationality'] and meta['nationality'] == nationality['value'] %}selected{% endif %}>
                                    {{ nationality['label'] }}
                                </option>
                            {% endfor %}
                            {% if nationality_unknown %}
                                <option value="{{ meta['nationality'] }}" selected>{{ meta['nationality'] }}</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="inputSector">Sector:</label>
                        <input class="form-control" type="text" id="inputSector" name="sector" placeholder="Sector - (optional)" value="{{ meta['sector'] if meta['sector'] else '' }}" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="inputType">Type:</label>
                        <input class="form-control" type="text" id="inputType" name="org_type" placeholder="Type - (optional)" value="{{ meta['org_type'] if meta['org_type'] else '' }}" autocomplete="off">
                    </div>

                    <button class="btn btn-lg btn-primary btn-block mt-3" type="submit">Save changes</button>
                </form>

    	    </div>
		</div>
	</div>
</body>

<script>
$(document).ready(function(){
    $("#nav_orgs_list").addClass("active");
	$("#nav_orgs_management").removeClass("text-muted");
} );

function toggle_sidebar(){
	if($('#nav_menu').is(':visible')){
		$('#nav_menu').hide();
		$('#side_menu').removeClass('border-right')
		$('#side_menu').removeClass('col-lg-2')
		$('#core_content').removeClass('col-lg-10')
	}else{
		$('#nav_menu').show();
		$('#side_menu').addClass('border-right')
		$('#side_menu').addClass('col-lg-2')
		$('#core_content').addClass('col-lg-10')
	}
}

</script>

</html>
